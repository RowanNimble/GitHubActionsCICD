name: Deploy UiPath Project

on:
  push:
    branches:
      - main
      - feature/**
      - bugfix/**
      - hotfix/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  UIPATH_PROJECT_PATH: "."
  UIPATH_OUTPUT_PATH: "output"
  UIPATH_CLOUD_URL: "https://cloud.uipath.com/"
  UIPATH_TENANT_NAME: "Nimble_Institute"
  UIPATH_ACCOUNT_NAME: "nimble_institute"

jobs:
  build-and-deploy:
    name: Build and Deploy UiPath Package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install UiPath CLI
        shell: powershell
        run: |
          dotnet tool install --global UiPath.CLI.Windows
          uipcli --help

      - name: Pack UiPath project
        shell: powershell
        run: |
          uipcli package pack "${{ env.UIPATH_PROJECT_PATH }}" --output "${{ env.UIPATH_OUTPUT_PATH }}" --version "1.0.${{ github.run_number }}"

      - name: Find package
        shell: powershell
        run: |
          Get-ChildItem "${{ env.UIPATH_OUTPUT_PATH }}" -Filter "*.nupkg"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: uipath-package
          path: output/*.nupkg

      - name: Deploy package to Orchestrator
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/hotfix/'))
        shell: powershell
        run: |
          $package = Get-ChildItem "${{ env.UIPATH_OUTPUT_PATH }}" -Filter "*.nupkg" | Select-Object -First 1

          uipcli package deploy `
            $package.FullName `
            "${{ env.UIPATH_CLOUD_URL }}" `
            "${{ env.UIPATH_TENANT_NAME }}" `
            -t "${{ secrets.UIPATH_PAT }}" `
            -a "${{ env.UIPATH_ACCOUNT_NAME }}" `
            -o "${{ secrets.UIPATH_FOLDER_NAME }}" `
            --entryPointsPath "Main.xaml" `
            --traceLevel "Information"
